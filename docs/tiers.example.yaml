# Tier-schema smoke fixture for ai-workflows.
#
# **This file is NOT the authoritative tier configuration at runtime.**
#
# Each shipped workflow defines its own tier registry in Python via a
# `<workflow>_tier_registry()` function. The dispatch layer
# (`ai_workflows.workflows._dispatch._resolve_tier_registry()`) calls
# that function to resolve tier bindings for a run — this file is
# never loaded on the dispatch path.
#
# M15 shipped: this file has been relocated from `tiers.yaml` to
# `docs/tiers.example.yaml` as a user-facing schema-reference example.
# It is not loaded at runtime.
#
# This file exists so `tests/primitives/test_tiers_loader.py` has a
# real on-disk example to parse against the `TierRegistry.load()`
# schema — an M1 schema-smoke check that guards against silent
# regressions in the `TierConfig` / `LiteLLMRoute` / `ClaudeCodeRoute`
# pydantic models. The entries below cover every route kind the
# project currently supports so the parse is exhaustive.
#
# Authoritative tier registries — read the workflow modules:
#   * `ai_workflows/workflows/planner.py` — `planner_tier_registry()`
#     (`planner-explorer` → Qwen/Ollama; `planner-synth` → Claude Opus).
#   * `ai_workflows/workflows/slice_refactor.py` — composes the planner
#     registry + adds `slice-worker` → Qwen/Ollama.
#
# Two route kinds exist:
#   * kind: litellm      — routed through LiteLLM (Gemini, Ollama/Qwen).
#                          `model` is a LiteLLM model string.
#   * kind: claude_code  — routed through the `claude` CLI subprocess;
#                          `cli_model_flag` is forwarded as `--model`.
#
# Provider strategy (KDR-003 / KDR-007 / KDR-011, architecture.md §4.1)
# --------------------------------------------------------------------
# * `local_coder` — Qwen via Ollama (local, zero-cost).
# * `opus` / `sonnet` / `haiku` — Claude Code CLI subprocess using the
#    developer's Claude Max subscription (OAuth; no Anthropic API key).

local_coder:
  route:
    kind: litellm
    model: ollama/qwen2.5-coder:32b
    api_base: "${OLLAMA_BASE_URL:-http://localhost:11434}"
  max_concurrency: 1

opus:
  route:
    kind: claude_code
    cli_model_flag: opus
  max_concurrency: 1
  per_call_timeout_s: 600

sonnet:
  route:
    kind: claude_code
    cli_model_flag: sonnet
  max_concurrency: 1

haiku:
  route:
    kind: claude_code
    cli_model_flag: haiku
  max_concurrency: 2
