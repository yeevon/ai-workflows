# Model tier configuration for ai-workflows.
#
# Each tier is a named (provider, model, parameters) bundle. Components
# reference tiers by name (e.g. `tier: "haiku"`) rather than hard-coding
# model IDs, so a workflow can be retargeted by editing one file.
#
# This top-level file is committed and represents the project default.
# Machine- or user-specific overrides go in `tiers.local.yaml` (gitignored)
# and are merged on top at load time by ai_workflows.primitives.tiers.
#
# The full schema is defined in M1 Task 07. This stub exists so that
# `tiers.yaml` is present from Task 01 and tests can assert it loads.

tiers: {}
