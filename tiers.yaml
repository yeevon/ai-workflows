# Model tier configuration for ai-workflows.
#
# Each top-level key is a tier name. Its value is a TierConfig (see
# `ai_workflows/primitives/tiers.py`): a discriminated `route` plus
# concurrency/timeout knobs. Two route kinds exist:
#
#   * kind: litellm      — routed through LiteLLM (Gemini, Ollama/Qwen).
#                          `model` is a LiteLLM model string.
#   * kind: claude_code  — routed through the `claude` CLI subprocess;
#                          `cli_model_flag` is forwarded as `--model`.
#
# This file is committed and represents the project default. Machine- or
# user-specific overrides go in `tiers.local.yaml` (gitignored) and are
# deep-merged on top at load time.
#
# Provider strategy (KDR-003 / KDR-007, architecture.md §4.1)
# -----------------------------------------------------------
# * `planner` / `implementer` — Gemini via LiteLLM (GEMINI_API_KEY).
# * `local_coder` — Qwen via a LAN Ollama instance (zero-cost, private).
# * `opus` / `sonnet` / `haiku` — Claude Code CLI subprocess using the
#    developer's Claude Max subscription (OAuth; no Anthropic API key).

planner:
  route:
    kind: litellm
    model: gemini/gemini-2.5-flash
  max_concurrency: 2
  per_call_timeout_s: 180

implementer:
  route:
    kind: litellm
    model: gemini/gemini-2.5-flash
  max_concurrency: 2

local_coder:
  route:
    kind: litellm
    model: ollama/qwen2.5-coder:32b
    api_base: "${OLLAMA_BASE_URL:-http://localhost:11434}"
  max_concurrency: 1

opus:
  route:
    kind: claude_code
    cli_model_flag: opus
  max_concurrency: 1
  per_call_timeout_s: 600

sonnet:
  route:
    kind: claude_code
    cli_model_flag: sonnet
  max_concurrency: 1

haiku:
  route:
    kind: claude_code
    cli_model_flag: haiku
  max_concurrency: 2
